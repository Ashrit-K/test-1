<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hong Kong + Macau Visual Itinerary</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --ink: #1e2528;
      --muted: #667277;
      --paper: #f6f3ee;
      --panel: #ffffff;
      --line: #d7ddd9;
      --sea: #dbeef2;
      --land: #ece7dc;
      --accent: #006d77;
      --accent-2: #b85c38;
      --accent-3: #5f6f52;
      --shadow: 0 18px 40px rgba(35, 45, 48, 0.13);
      --map-height: 660px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    .shell {
      max-width: 1760px;
      margin: 0 auto;
      padding: 28px;
    }

    header {
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .dek {
      margin: 0;
      max-width: 850px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .app-frame {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .tabs {
      display: flex;
      flex-direction: column;
      gap: 7px;
      position: sticky;
      top: 18px;
      overflow: visible;
      padding: 0;
      margin: 0;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      width: 100%;
      min-width: 0;
      padding: 8px 8px;
      cursor: pointer;
      text-align: center;
      box-shadow: none;
      font-size: 13px;
      line-height: 1.1;
    }

    .tab span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
      margin-top: 2px;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .tab.active span {
      color: rgba(255, 255, 255, 0.78);
    }

    .page {
      display: none;
    }

    #pages {
      min-width: 0;
    }

    .page.active {
      display: block;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(720px, 1.58fr) minmax(330px, 0.72fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .summary {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .map-wrap {
      padding: 0;
      background: #dce9eb;
      position: relative;
      isolation: isolate;
    }

    .leaflet-map {
      width: 100%;
      height: var(--map-height);
      min-height: 430px;
      background: #dce9eb;
      font-family: inherit;
    }

    .map-label {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 500;
      max-width: min(360px, calc(100% - 28px));
      padding: 10px 12px;
      border: 1px solid rgba(30, 37, 40, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 12px 28px rgba(35, 45, 48, 0.15);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .map-label strong {
      display: block;
      color: var(--accent);
      font-size: 12px;
      line-height: 1.15;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .map-label span {
      display: block;
      margin-top: 3px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
    }

    .timeline {
      padding: 10px 0;
      max-height: 650px;
      overflow: auto;
    }

    .event {
      display: grid;
      grid-template-columns: 98px 1fr;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid #eef0ed;
    }

    .event:last-child {
      border-bottom: 0;
    }

    .time {
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      line-height: 1.4;
    }

    .event-heading {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-bottom: 5px;
    }

    .event-title-copy {
      min-width: 0;
    }

    .event h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .event-place-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .place-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      max-width: 100%;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .place-pill .stop-num {
      width: 20px;
      height: 20px;
      font-size: 10px;
    }

    .event p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      background: #fbfcfb;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      background: var(--accent);
    }

    .dot.shopping {
      background: var(--accent-2);
    }

    .dot.food {
      background: var(--accent-3);
    }

    .stop-key {
      padding: 12px 16px 14px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .stop-key-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .stop-key-head strong {
      color: var(--ink);
      font-size: 12px;
    }

    .stop-key-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px 14px;
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 170px;
      overflow: auto;
    }

    .stop-key-list li {
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: start;
      gap: 7px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .stop-key-list span:last-child {
      min-width: 0;
    }

    .stop-num {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .stop-num.shopping {
      background: var(--accent-2);
    }

    .stop-num.food {
      background: var(--accent-3);
    }

    .stop-num.logistics {
      background: #334e68;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }

    .leaflet-container {
      color: var(--ink);
      font-family: inherit;
    }

    .leaflet-control-zoom a {
      color: var(--ink);
    }

    .leaflet-reset-control {
      margin-top: 7px;
    }

    .leaflet-reset-control button {
      min-width: 54px;
      height: 28px;
      border: 0;
      border-radius: 2px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font: 700 12px/1 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .leaflet-reset-control button:hover {
      background: #f4f6f4;
    }

    .leaflet-number-icon {
      background: transparent;
      border: 0;
    }

    .stop-marker {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50% 50% 50% 0;
      border: 3px solid #fff;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 9px 20px rgba(24, 38, 44, 0.28);
      transform: translate(-1px, -4px) rotate(-45deg);
      transition: transform 140ms ease, box-shadow 140ms ease, outline-color 140ms ease;
    }

    .stop-marker span {
      display: block;
      transform: rotate(45deg);
    }

    .stop-marker.shopping {
      background: var(--accent-2);
    }

    .stop-marker.food {
      background: var(--accent-3);
    }

    .stop-marker.default {
      background: var(--accent);
    }

    .stop-marker.logistics {
      background: #334e68;
    }

    .stop-marker.active {
      outline: 5px solid rgba(240, 162, 2, 0.6);
      outline-offset: 3px;
      box-shadow: 0 12px 26px rgba(24, 38, 44, 0.34);
      transform: translate(-1px, -4px) rotate(-45deg) scale(1.17);
    }

    .leaflet-popup-content {
      margin: 9px 11px;
      font-size: 12px;
      line-height: 1.35;
    }

    .map-note {
      padding: 10px 16px 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      border-top: 1px solid var(--line);
      background: #fbfcfb;
    }

    .overview-summary-event {
      cursor: default;
    }

    .overview-summary-event .time span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: none;
    }

    .route-list {
      flex: 0 1 auto;
      max-height: var(--map-height);
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 8px 0;
    }

    .mini-event {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #f0f1ef;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .mini-event:last-child {
      border-bottom: 0;
    }

    .mini-event strong {
      color: var(--ink);
      font-weight: 700;
    }

    .mini-event-main {
      min-width: 0;
    }

    .mini-event-title {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--ink);
      font-weight: 700;
    }

    .mini-event-place {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 4px 0 2px;
      color: var(--muted);
    }

    .event {
      cursor: pointer;
      border-left: 4px solid transparent;
    }

    .event.active {
      background: #fff8ea;
      border-left-color: #f0a202;
    }

    @media (max-width: 1020px) {
      :root {
        --map-height: 520px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 900px) {
      .app-frame {
        grid-template-columns: 1fr;
      }

      .tabs {
        position: static;
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 14px;
      }

      .tab {
        min-width: 112px;
        text-align: center;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 16px;
      }

      h1 {
        font-size: 27px;
      }

      .event {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      .stop-key-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .map-label {
        position: static;
        max-width: none;
        border-width: 0 0 1px;
        border-radius: 0;
        box-shadow: none;
      }

    }

    @media (max-width: 760px) {
      :root {
        --map-height: 430px;
      }

      .stop-key-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Hong Kong + Macau Visual Itinerary</h1>
        <p class="dek">A day-by-day route visualization for May 26 to Jun 1. Each day is its own page with an interactive Hong Kong / Macau map, numbered stops, shopping chunks, food stops, and logistics anchors.</p>
      </div>
    </header>

    <div class="app-frame">
      <nav class="tabs" id="tabs" aria-label="Itinerary pages"></nav>
      <section id="pages"></section>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

          ["10:35-11:10", "Immigration / bags / customs buffer", "Live buffer for the delayed arrival. If not out of customs by about 11:15, skip Kennedy Town entirely and protect City Chain, Symphony viewing, Mak's Noodle, and sleep.", "logistics", [0]],
          ["11:20-11:45", "Airport Express to Hong Kong Station", "Airport Express chain: Airport Station start -> Airport Express -> Hong Kong Station end. Buy the Group of 2 ticket before boarding if the counter flow is easy; otherwise prioritize getting into town.", "logistics", [0, 1]],
          ["11:45-12:15", "Transfer to Ramada", "MTR chain: Hong Kong Station start -> walk through Central station complex, Island Line toward Kennedy Town -> Sai Ying Pun end -> short map-guided walk to Ramada.", "logistics", [1, 2]],
          ["12:15-12:35", "Bag drop at Ramada", "Bag drop only. Keep passports, City Chain email, watch docs, transit card, and the intended payment card with you. Take early check-in only if immediate.", "logistics", [2]],

          ["07:30-08:00", "MTR to Central / Soho", "MTR chain: Sai Ying Pun start, Island Line toward Chai Wan -> Central end -> walk uphill to Soho / Bakehouse. Keep the pace easy; this is not a hiking morning.", "logistics", [0, 1]],

    const tabs = document.getElementById("tabs");
    const pages = document.getElementById("pages");

    function makeMap(day) {
      return `
        <div class="map-wrap">
          <div class="map-label">
            <strong>${day.tab || "Map"}</strong>
            <span>${day.title}</span>
          </div>
          <div class="leaflet-map" data-leaflet-day="${day.id}" aria-label="${day.title} map"></div>
        </div>
        <div class="legend">
          <span class="legend-item"><span class="dot"></span> Sights / stays</span>
          <span class="legend-item"><span class="dot shopping"></span> Shopping</span>
          <span class="legend-item"><span class="dot food"></span> Food / drink</span>
        </div>
        ${makeStopKey(day)}
        <div class="map-note">${day.overview ? "Overview pins show the main trip anchors across Hong Kong, Macau, Lantau, beach, shopping, hotels, and airport." : "Numbered pins match unique locations. Repeated stops reuse the first number and still appear each time in the detailed route."}</div>
      `;
    }

    function stopNumber(number, type) {
      return `<span class="stop-num ${markerTypeClass(type)}">${number}</span>`;
    }

    function pointKey(point) {
      return `${point[0].toLowerCase().trim()}|${point[1].toFixed(4)},${point[2].toFixed(4)}`;
    }

    function uniqueStops(day) {
      const seen = new Map();
      const stops = [];
      day.points.forEach((point, index) => {
        const key = pointKey(point);
        if (seen.has(key)) return;
        const meta = {
          canonicalIndex: index,
          displayNumber: stops.length + 1,
          point
        };
        seen.set(key, meta);
        stops.push(meta);
      });
      return stops;
    }

    function stopMeta(day, index) {
      const key = pointKey(day.points[index]);
      return uniqueStops(day).find(stop => pointKey(stop.point) === key);
    }

    function makeStopKey(day) {
      return `
        <div class="stop-key">
          <div class="stop-key-head">
            <strong>Numbered location key</strong>
            <span>${day.overview ? "Full-trip anchors." : `Unique locations for ${day.tab}; repeats reuse the first number.`}</span>
          </div>
          <ol class="stop-key-list">
            ${uniqueStops(day).map(stop => `
              <li>
                ${stopNumber(stop.displayNumber, stop.point[3])}
                <span>${stop.point[0]}</span>
              </li>
            `).join("")}
          </ol>
        </div>
      `;
    }

    function eventStops(day, event, fallbackIndex) {
      const override = event[4];
      const markerIndexes = Array.isArray(override)
        ? override
        : Number.isInteger(override)
          ? [override]
          : [eventMarkerIndex(day, event, fallbackIndex)];
      return markerIndexes
        .filter(markerIndex => markerIndex >= 0 && markerIndex < day.points.length)
        .map(stopIndex => ({ stopIndex, point: day.points[stopIndex], ...stopMeta(day, stopIndex) }));
    }

    function placePills(stops) {
      return stops.map(({ displayNumber, point }) => `
        <span class="place-pill">${stopNumber(displayNumber, point[3])}<span>${point[0]}</span></span>
      `).join("");
    }

    function eventMarkup(day, event, fallbackIndex) {
      const stops = eventStops(day, event, fallbackIndex);
      return `
        <article class="event" data-marker="${stops.map(stop => stop.canonicalIndex).join(",")}">
          <div class="time">${event[0]}</div>
          <div>
            <div class="event-heading">
              <div class="event-title-copy">
                <h3>${event[1]}</h3>
                <div class="event-place-list">${placePills(stops)}</div>
              </div>
            </div>
            <p>${event[2]}</p>
          </div>
        </article>
      `;
    }

    function miniEventMarkup(day, event, fallbackIndex) {
      const stops = eventStops(day, event, fallbackIndex);
      return `
        <div class="mini-event">
          <span>${event[0]}</span>
          <span class="mini-event-main">
            <span class="mini-event-title"><strong>${event[1]}</strong></span>
            <span class="mini-event-place">${placePills(stops)}</span>
            ${event[2]}
          </span>
        </div>
      `;
    }

    function eventMarkerIndex(day, event, fallbackIndex) {
      const title = event[1].toLowerCase();
      let bestIndex = Math.min(fallbackIndex, day.points.length - 1);
      let bestScore = 0;
      day.points.forEach((point, index) => {
        const label = point[0].toLowerCase();
        const labelParts = label.split(/[^a-z0-9]+/).filter(token => token.length >= 4);
        let score = 0;
        if (title.includes(label) || label.includes(title)) score += 10;
        labelParts.forEach(token => {
          if (title.includes(token)) score += 2;
        });
        if ((title.includes("airport") || title.includes("hkg")) && label.includes("hkg")) score += 6;
        if (title.includes("sinn") && label.includes("city chain")) score += 8;
        if (title.includes("bag") && label.includes("ramada")) score += 5;
        if (title.includes("watchdrobe") && label.includes("watchdrobe")) score += 8;
        if (title.includes("sneaker") && label.includes("sneaker")) score += 8;
        if (title.includes("ashwin") && label.includes("olympic")) score += 8;
        if (title.includes("symfony") && label.includes("tst")) score += 4;
        if (title.includes("symphony") && label.includes("tst")) score += 4;
        if (score > bestScore) {
          bestScore = score;
          bestIndex = index;
        }
      });
      return bestIndex;
    }

    function makeTimeline(day) {
      if (day.overview) {
        return makeOverviewList();
      }
      return makeRouteList(day);
    }

    function makeOverviewList() {
      return `
        <div class="route-list overview-route-list">
          ${days.filter(day => !day.overview).map(day => `
            <article class="event overview-summary-event">
              <div class="time">${day.tab}<span>${day.date}</span></div>
              <div>
                <div class="event-heading">
                  <div class="event-title-copy">
                    <h3>${day.title}</h3>
                  </div>
                </div>
                <p>${day.summary}</p>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function makeRouteList(day) {
      return `
        <div class="route-list">
          ${day.events.map((event, index) => eventMarkup(day, event, index)).join("")}
        </div>
      `;
    }

    function makePage(day, index) {
      const displayDay = day;
      return `
        <article class="page ${index === 0 ? "active" : ""}" id="${day.id}">
          <div class="layout">
            <section class="panel">
              <div class="panel-head">
                <p class="eyebrow">${day.date}</p>
                <h2>${day.title}</h2>
                <p class="summary" data-map-summary>${day.summary}</p>
              </div>
              <div data-map-holder>${makeMap(displayDay)}</div>
            </section>
            <section class="panel">
              <div class="panel-head">
                <p class="eyebrow">${day.overview ? "Full-trip shape" : "Every time block in order"}</p>
                <h2>${day.overview ? "Day Summary" : "Detailed Agenda"}</h2>
              </div>
              ${makeTimeline(day)}
            </section>
          </div>
        </article>
      `;
    }

    tabs.innerHTML = days.map((day, index) => `
      <button class="tab ${index === 0 ? "active" : ""}" type="button" data-target="${day.id}">
        ${day.tab}<span>${day.date}</span>
      </button>
    `).join("");

    pages.innerHTML = days.map(makePage).join("");

    function markerTypeClass(type) {
      return type === "shopping" || type === "food" || type === "logistics" ? type : "default";
    }

    function fitMapToStops(map, latLngs) {
      if (latLngs.length === 1) {
        map.setView(latLngs[0], 14);
      } else {
        map.fitBounds(latLngs, { paddingTopLeft: [30, 82], paddingBottomRight: [30, 30], maxZoom: 14 });
      }
    }

    function addResetControl(map, latLngs) {
      const resetControl = L.control({ position: "topright" });
      resetControl.onAdd = () => {
        const container = L.DomUtil.create("div", "leaflet-bar leaflet-reset-control");
        const button = L.DomUtil.create("button", "", container);
        button.type = "button";
        button.textContent = "Reset";
        button.title = "Reset map view to all stops";
        button.setAttribute("aria-label", "Reset map view to all stops");
        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.on(button, "click", event => {
          L.DomEvent.preventDefault(event);
          fitMapToStops(map, latLngs);
        });
        return container;
      };
      resetControl.addTo(map);
    }

    function setupMapInteractions(scope = document) {
      scope.querySelectorAll("[data-leaflet-day]").forEach(container => {
        if (!window.L) {
          container.innerHTML = "<div style='padding:18px;color:#667277'>Map tiles need an internet connection to load.</div>";
          return;
        }
        if (container._leafletMap) {
          setTimeout(() => {
            container._leafletMap.invalidateSize();
            if (container._leafletLatLngs?.length) {
              fitMapToStops(container._leafletMap, container._leafletLatLngs);
            }
          }, 0);
          return;
        }
        const day = days.find(item => item.id === container.dataset.leafletDay);
        if (!day) return;

        const map = L.map(container, {
          scrollWheelZoom: true,
          zoomControl: false,
          attributionControl: true,
          worldCopyJump: true
        });
        container._leafletMap = map;

        const primaryTiles = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
        }).addTo(map);
        let fallbackTilesLoaded = false;
        primaryTiles.on("tileerror", () => {
          if (fallbackTilesLoaded) return;
          fallbackTilesLoaded = true;
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap contributors"
          }).addTo(map);
        });
        L.control.zoom({ position: "topright" }).addTo(map);
        L.control.scale({ imperial: false, position: "bottomleft" }).addTo(map);

        const uniqueStopMetas = uniqueStops(day);
        const coordinateCounts = new Map();
        uniqueStopMetas.forEach(({ point }) => {
          const key = `${point[1].toFixed(4)},${point[2].toFixed(4)}`;
          coordinateCounts.set(key, (coordinateCounts.get(key) || 0) + 1);
        });
        const coordinateSeen = new Map();
        const latLngs = uniqueStopMetas.map(({ point }) => {
          const [, lat, lon] = point;
          const key = `${lat.toFixed(4)},${lon.toFixed(4)}`;
          const count = coordinateCounts.get(key);
          if (count === 1) return [lat, lon];
          const seen = coordinateSeen.get(key) || 0;
          coordinateSeen.set(key, seen + 1);
          const angle = ((Math.PI * 2) / count) * seen - Math.PI / 2;
          const offset = 0.00036;
          return [lat + Math.sin(angle) * offset, lon + Math.cos(angle) * offset];
        });
        container._leafletLatLngs = latLngs;
        const markers = [];
        uniqueStopMetas.forEach((stop, index) => {
          const [label, , , type] = stop.point;
          const icon = L.divIcon({
            className: "leaflet-number-icon",
            html: `<div class="stop-marker ${markerTypeClass(type)}" data-marker-pin="${stop.canonicalIndex}"><span>${stop.displayNumber}</span></div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 30],
            popupAnchor: [0, -26]
          });
          const marker = L.marker(latLngs[index], { icon }).addTo(map);
          marker.bindPopup(`<strong>${stop.displayNumber}. ${label}</strong>`);
          markers[stop.canonicalIndex] = marker;
        });
        container._leafletMarkers = markers;
        addResetControl(map, latLngs);

        fitMapToStops(map, latLngs);
        setTimeout(() => map.invalidateSize(), 0);
      });
    }

    function focusMarker(page, markerIds) {
      const activeIds = String(markerIds).split(",").filter(Boolean);
      page.querySelectorAll("[data-marker-pin]").forEach(marker => {
        marker.classList.toggle("active", activeIds.includes(marker.dataset.markerPin));
      });
      const mapContainer = page.querySelector(".leaflet-map");
      const marker = mapContainer?._leafletMarkers?.[Number(activeIds[0])];
      if (marker && mapContainer._leafletMap) {
        marker.openPopup();
        mapContainer._leafletMap.panTo(marker.getLatLng(), { animate: true, duration: 0.45 });
      }
    }

    tabs.addEventListener("click", (event) => {
      const button = event.target.closest(".tab");
      if (!button) return;
      document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === button));
      document.querySelectorAll(".page").forEach(p => p.classList.toggle("active", p.id === button.dataset.target));
      history.replaceState(null, "", `#${button.dataset.target}`);
      setupMapInteractions(document.getElementById(button.dataset.target));
    });

    pages.addEventListener("click", (event) => {
      const item = event.target.closest(".event");
      if (!item) return;
      const page = item.closest(".page");
      const markerId = item.dataset.marker;
      page.querySelectorAll(".event").forEach(eventItem => eventItem.classList.toggle("active", eventItem === item));
      focusMarker(page, markerId);
    });

    setupMapInteractions();

    const initial = location.hash.replace("#", "");
    if (initial) {
      const button = document.querySelector(`.tab[data-target="${initial}"]`);
      if (button) button.click();
    }
  </script>
</body>
</html>
